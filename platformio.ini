; MechBadge — ROM-fit test
; Target: ESP32-S3-MINI-1-N8 (8 MB flash, no PSRAM)
;
; BOM:
;   MCU     ESP32-S3-MINI-1-N8        (DigiKey ESP32-S3R8)
;   Display CFAF240240A4-013TN        (ST7789H2, SPI)
;   IMU     ICM-20948                 (I2C)
;   Fuel    MAX17048G+T10             (I2C, shared bus)
;   Charge  MCP73831T-2ACI/OT
;   Reg     AP2112K-3.3
;   USB     USB4125-GF-A-0190 (USB-C)

[env:esp32s3mini]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; 8 MB QIO, no PSRAM (N8 — qio_opi is for octal-PSRAM R8 variant)
board_upload.flash_size         = 8MB
board_build.flash_size          = 8MB
board_build.partitions          = default_8MB.csv
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode          = qio
board_build.flash_freq          = 80m

; ESP-NOW, WiFi, NVS (Preferences), mbedtls are built into the framework
lib_deps =
    h2zero/NimBLE-Arduino
    sparkfun/SparkFun 9DoF IMU Breakout - ICM 20948 - Arduino Library
    adafruit/Adafruit MAX1704X

; st7789h2    — drop st7789h2.cpp + st7789h2.h into lib/st7789h2/
; libqrencode — drop source files into lib/libqrencode/

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

    ; WiFi + BLE coexistence
    -DCONFIG_ESP_COEX_SW_COEXIST_ENABLE=1

    ; NimBLE roles
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=1

    ; I2C pins — shared by ICM-20948 and MAX17048
    -DPIN_SDA=8
    -DPIN_SCL=9

    ; SPI pins — CFAF240240A4-013TN (ST7789H2)
    -DPIN_DISP_MOSI=11
    -DPIN_DISP_SCLK=12
    -DPIN_DISP_CS=10
    -DPIN_DISP_DC=13
    -DPIN_DISP_RST=14
    -DPIN_DISP_BL=15

    ; badge identity — override per board
    -DBADGE_PLAYER_ID=0xDEADBEEF
    -DBADGE_ID=0x00
    -DBADGE_FACTION_ID=0x01
    -DBADGE_MECH_CLASS=0x02